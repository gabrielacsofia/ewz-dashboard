<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EWZ Capital · Wealth Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg:#07160e;--surface:#0c1f10;--card:#0f2014;--card2:#142a17;
    --border:#1c3d20;--border2:#263f2a;
    --gold:#7bc44a;--gold2:#9dd96a;--gold-dim:rgba(123,196,74,0.12);
    --cream:#e8e0d0;--muted:#6b8a72;--muted2:#4a6450;
    --green:#7bc44a;--green-dim:rgba(123,196,74,0.12);
    --blue:#3f8fd4;--orange:#e07d3d;--purple:#8b5cf6;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--cream);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(28,61,32,0.15) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(28,61,32,0.15) 40px);pointer-events:none;z-index:0;}

  /* TOPBAR */
  .topbar{position:sticky;top:0;z-index:100;background:rgba(7,22,14,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:58px;gap:16px;}
  .brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .logo-box img{width:34px;height:34px;object-fit:contain;}
  .brand-title{font-family:'Fraunces',serif;font-size:1rem;font-weight:600;color:var(--cream);letter-spacing:.01em;}
  .brand-badge{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:1px;}
  .client-info{display:flex;align-items:center;gap:10px;flex:1;justify-content:center;}
  .client-av{width:32px;height:32px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(123,196,74,.3);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:var(--gold);flex-shrink:0;}
  .client-name{font-size:.9rem;font-weight:600;color:var(--cream);}
  .client-code{font-size:.7rem;color:var(--muted);letter-spacing:.05em;}
  .focus-pill{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:.7rem;cursor:pointer;transition:border-color .15s;flex-shrink:0;}
  .focus-pill:hover{border-color:var(--gold);}
  .focus-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;}
  .focus-dot.stale{background:var(--orange);}
  .tabs{display:flex;gap:2px;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:3px;flex-shrink:0;}
  .tab-btn{padding:5px 16px;border-radius:6px;border:none;background:transparent;color:var(--muted);font-size:.75rem;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:.04em;font-family:'DM Sans',sans-serif;}
  .tab-btn.act{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(123,196,74,.3);}

  /* MAIN */
  .main{position:relative;z-index:1;padding:24px 28px;max-width:1380px;margin:0 auto;}
  .tab-content{display:none;}
  .tab-content.act{display:block;}

  /* UPLOAD */
  .upload-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:24px;}
  .upload-zone{width:100%;max-width:520px;border:2px dashed var(--border2);border-radius:18px;padding:48px 32px;display:flex;flex-direction:column;align-items:center;gap:14px;cursor:pointer;transition:all .2s;background:var(--card);}
  .upload-zone:hover,.upload-zone.drag{border-color:var(--gold);background:rgba(123,196,74,.04);}
  .upload-icon{width:64px;height:64px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:border-color .2s;}
  .upload-zone:hover .upload-icon,.upload-zone.drag .upload-icon{border-color:var(--gold);}
  .upload-icon svg{width:28px;height:28px;stroke:var(--muted);stroke-width:1.5;fill:none;transition:stroke .2s;}
  .upload-zone:hover .upload-icon svg,.upload-zone.drag .upload-icon svg{stroke:var(--gold);}
  .upload-title{font-family:'Fraunces',serif;font-size:1.15rem;font-weight:400;color:var(--cream);}
  .upload-sub{font-size:.78rem;color:var(--muted);text-align:center;line-height:1.6;max-width:320px;}
  .upload-btn{display:inline-flex;align-items:center;gap:8px;background:var(--gold-dim);border:1px solid rgba(123,196,74,.3);color:var(--gold);border-radius:8px;padding:8px 20px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;}
  .upload-btn:hover{background:rgba(123,196,74,.2);border-color:var(--gold);}
  .upload-format{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:16px 20px;max-width:520px;width:100%;}
  .upload-format-title{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .format-tags{display:flex;flex-wrap:wrap;gap:6px;}
  .ftag{font-size:.68rem;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:3px 10px;color:var(--muted);}
  .ftag span{color:var(--cream);}

  /* EMPTY */
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:65vh;gap:14px;}
  .empty-icon{width:72px;height:72px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;}
  .empty-icon svg{width:32px;height:32px;color:var(--muted2);stroke:currentColor;fill:none;}
  .empty h3{font-family:'Fraunces',serif;font-size:1.2rem;color:var(--cream);font-weight:400;}
  .empty p{font-size:.8rem;color:var(--muted);max-width:260px;text-align:center;line-height:1.6;}

  .label{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}

  /* STRIP */
  .strip{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr 1fr;gap:12px;margin-bottom:20px;}
  .sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
  .sc.hi{border-color:rgba(123,196,74,.25);background:linear-gradient(135deg,#0c1f10,#0f2014);}
  .sc .label{margin-bottom:5px;}
  .sc .val{font-family:'Fraunces',serif;font-size:1.45rem;font-weight:400;color:var(--cream);line-height:1.1;}
  .sc .val.g{color:var(--green);}
  .sc .val.gold{color:var(--gold);}
  .sc .sub{font-size:.68rem;color:var(--muted);margin-top:3px;}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:.62rem;padding:2px 8px;border-radius:20px;margin-top:4px;}
  .badge.g{background:var(--green-dim);color:var(--green);}
  .badge.gold{background:var(--gold-dim);color:var(--gold);}

  /* GRID */
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
  .gfull{margin-bottom:16px;}

  /* PANEL */
  .panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;}
  .phead{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .ptitle{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:7px;}
  .ptitle::before{content:'';display:block;width:5px;height:5px;border-radius:50%;background:var(--gold);}

  /* PIE */
  .pie-wrap{display:flex;align-items:center;gap:18px;}
  .pie-c{position:relative;width:150px;height:150px;flex-shrink:0;}
  .pie-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
  .pie-val{font-family:'Fraunces',serif;font-size:1.05rem;color:var(--cream);}
  .pie-lbl{font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:1px;}
  .leg{display:flex;flex-direction:column;gap:8px;flex:1;overflow-y:auto;max-height:200px;}
  .leg-item{display:flex;align-items:center;gap:8px;}
  .leg-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}
  .leg-name{font-size:.75rem;flex:1;color:var(--cream);}
  .leg-pct{font-size:.72rem;font-weight:600;color:var(--muted);}
  .leg-val{font-size:.68rem;color:var(--muted2);}

  /* TAXA CARDS */
  .taxa-grid{display:grid;gap:12px;}
  .taxa-card{position:relative;overflow:hidden;background:var(--card2);border:1px solid var(--border2);border-radius:14px;padding:20px 22px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:16px;transition:border-color .2s,transform .15s;cursor:pointer;}
  .taxa-card:hover{transform:translateX(2px);}
  .taxa-card-left{display:flex;flex-direction:column;gap:3px;padding-left:4px;}
  .taxa-idx-name{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
  .taxa-rate-big{font-family:'Fraunces',serif;font-size:1.7rem;font-weight:400;line-height:1;}
  .taxa-rate-sub{font-size:.7rem;color:var(--muted);margin-top:2px;}
  .taxa-row{display:flex;gap:20px;margin-top:10px;}
  .taxa-proj-lbl{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2);margin-bottom:2px;}
  .taxa-proj-val{font-size:.88rem;font-weight:600;}
  .taxa-proj-cdi{font-size:.62rem;color:var(--muted);}
  .taxa-card-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
  .taxa-alloc-lbl{font-size:.62rem;color:var(--muted);text-align:right;}
  .taxa-alloc-val{font-size:.95rem;font-weight:700;text-align:right;}
  .taxa-weight-bar{width:70px;height:4px;background:var(--border);border-radius:2px;}
  .taxa-weight-fill{height:100%;border-radius:2px;}
  .taxa-click-hint{font-size:.58rem;color:var(--muted2);margin-top:2px;display:flex;align-items:center;gap:4px;}
  .exempt-badge{display:inline-flex;align-items:center;gap:4px;font-size:.6rem;padding:2px 7px;border-radius:10px;background:rgba(212,169,66,0.12);color:#d4a942;margin-top:5px;width:fit-content;}
  .unknown-deb-badge{display:inline-flex;align-items:center;gap:4px;font-size:.6rem;padding:2px 7px;border-radius:10px;background:rgba(224,125,61,0.1);color:#e07d3d;margin-top:4px;width:fit-content;}

  /* LINE CHART */
  .toggle-btns{display:flex;gap:6px;flex-wrap:wrap;}
  .tbtn{padding:5px 14px;border-radius:6px;cursor:pointer;font-size:.72rem;font-weight:600;border:1px solid var(--border2);background:transparent;color:var(--muted);transition:all .15s;letter-spacing:.05em;font-family:'DM Sans',sans-serif;}
  .tbtn:hover{border-color:var(--gold);color:var
